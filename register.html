<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CCS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./images/ccs.png">
</head>
<body class="bg-light">

<nav class="navbar">
    <h1 class="navbar-title">College of Computer Studies Sit-in Monitoring System</h1>
    <ul class="navbar-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#community">Community🠻</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="index.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
    </ul>
</nav>

<div class="register-container">
    <div class="register-card">
        <button class="back-btn" onclick="window.history.back()">Back</button>
        <h2 class="register-title">Sign up</h2>
        
        <div class="register-content">
            <form class="register-form">
                <div class="input-group">
                    <input type="text" required>
                    <label>ID Number</label>
                </div>
                <div class="input-group">
                    <input type="text" required>
                    <label>Last Name</label>
                </div>
                <div class="input-group">
                    <input type="text" required>
                    <label>First Name</label>
                </div>
                <div class="input-group">
                    <input type="text" required>
                    <label>Middle Name</label>
                </div>
                  <div class="input-group">
                    <select required>
                        <option value="" disabled selected>Select Course</option>
                        <option value="BSIT">Bachelor of Science in Information Technology</option>
                        <option value="BSCS">Bachelor of Science in Computer Science</option>
                        <option value="BSIS">Bachelor of Science in Information Systems</option>
                    </select>
                    <label>Course</label>
                </div>
                 <div class="input-group">
                    <select required>
                        <option value="" disabled selected>Select Year level</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                    <label>Course Level</label>
                </div>
                <div class="input-group">
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="input-group">
                    <input type="password" required>
                    <label>Repeat your password</label>
                </div>
                <div class="input-group">
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-group">
                    <input type="text" required>
                    <label>Address</label>
                </div>
                
                <button type="submit" class="register-btn">Register</button>
            </form>
            
            <div class="register-image">
                <img src="./images/signup-img.jpg" alt="Sign up illustration">
            </div>
        </div>
    </div>
</div>

</body>
</html>
