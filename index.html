<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS</title>
    <link rel="stylesheet" href="style.css">
     <link rel="icon" type="image/x-icon" href="./images/ccs.png">
</head>

<body>

<nav class="navbar">
    <h1 class="navbar-title">College of Computer Studies Sit-in 
        Monitoring System</h1>
    <ul class="navbar-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#community">Community🠻</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#login">Login</a></li>
        <li><a href="./register.html">Register</a></li>
    </ul>
</nav>

<div class="main-container">
    <div class="logo-section">
        <img src="./images/ccs.png" alt="CCS Logo" class="logo">
    </div>
    <form class="login-form">
        <input type="text" placeholder="Enter a valid ID number" required>
        <label>ID Number</label>
        <input type="password" placeholder="Enter your password" required>
        <label>Password</label>
        <div class="form-options">
            <label><input type="checkbox"> Remember me</label>
            <span class="forgot-form"><a href="#">Forgot password?</a></span>
        </div>
        <button type="submit" class="login-btn">Login</button>
        <div class="register-options">
            <span>Don't have an account? <a href="./register.html" class="register-link";>Register</a></span>
        </div>
    </form>
</div>

</body>
</html>
